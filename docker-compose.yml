services:
  codepilot:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./workspace:/app/workspace
    environment:
      - CODEPILOT_WORKSPACE_ROOT=/app/workspace
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
